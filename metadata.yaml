homepage: "https://www.floriangoetting.de"
documentation: "https://github.com/floriangoetting/json-tag"
versions:
  - sha: xyz
    changeNotes: Added support for event batching. Event batching is used to retry sending failed events (network or server errors) or to combine mutiple events which are sent fast after each other in a combined request. A library update to JSON Tag Library version 2.0.0 is required.
  - sha: 30f36119ec4fb9f999b2abfa9921bceee2ffb8e3
    changeNotes: Added support for the Base64 Encoding Fallback option which can be activated from the JSON Tag Settings Variable. Updating JSON Client, JSON Tag Settings and the JSON Tag Library to version 1.6.0 is required.
  - sha: 0f49513aaf1f0382d24da9c548dd1d4febcbbf0d
    changeNotes: Added support for "Add Timestamp" Option from the JSON Tag Settings Variable. This allows setting the timestamp client-side instead of relying on the server timestamp which can be very useful in some use cases.
  - sha: 14c506e894647ec6721d65aab71161714a0a7d30
    changeNotes: Added support for "Enable Data Collection" Flag from the JSON Tag Settings Variable. This can be very handy to disable the data collection for bot traffic or based on a consent status if you don't want to use Blocking Trigger for this purpose.
  - sha: d90729860f0433639902b9c027c25aa24428ac1e
    changeNotes: Allow manual selection of event sending method. Options are "fetch", "sendBeacon" and "fetchKeepalive". Default is "fetch". Fetch Keepalive is only used if explicitly selected.
  - sha: 1c3c3cbc125ab3cb2dbf7b3111fd8bdcc97ee58b
    changeNotes: Support for fetch keepalive requests. For JSON Tags where "sendBeacon" was selected, fetch keepalive request are used from now on if supported by the browser. Updating JSON Client and the JSON Tag Library is required.
  - sha: 62f50ab2670fffa7c1cf3f43ebe498bce6a5a6a1
    changeNotes: Support for setting the X-Gtm-Server-Preview Header manually in the JSON Tag Requests
  - sha: 108f34aa2f549bf9f27a0163b0787350d440d230
    changeNotes: Updated Template Description
  - sha: 2525f181474b472ec8253d7078bf05bb352b9972
    changeNotes: Initial release.